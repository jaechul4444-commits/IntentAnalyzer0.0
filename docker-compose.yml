version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyzer-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # [로컬 ES 사용 시에만 활성화] 내부 네트워크 통신용 주소
      # ⚠️ 99번 서버 등 외부 ES를 사용하시는 경우, 아래 라인을 주석 처리하고 .env 파일에 'ES_HOST=http://99번IP:9200'을 입력하세요.
      # - ES_HOST=http://elasticsearch:9200
      - PG_DSN=postgresql://postgres:password@db:5432/intent_db
    depends_on:
      db:
        condition: service_healthy
      # ⚠️ 외부 ES(99번)를 사용하시는 경우, 아래 elasticsearch 의존성 부분을 삭제하거나 주석 처리해야 89번 서버에서 단독으로 정상 구동됩니다.
      # elasticsearch:
      #   condition: service_healthy
    restart: always


  db:
    image: postgres:14
    container_name: analyzer-db
    environment:
      - POSTGRES_DB=intent_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intent_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: analyzer-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g" # 서버 성능에 맞게 조절 (최소 512m 권장)
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
    driver: local
  esdata:
    driver: local
