version: '3.8'

networks:
  ai-docker-net:
    external: true # [핵심] 챗봇 등 외부 컨테이너와 공용 브리지 네트워크를 통해 호스트 통신 공유

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyzer-web
    ports:
      - "8080:8000" # 8000번 충돌 방지용 외부 포트 8080 고정
    env_file:
      - .env
    environment:
      # 호스트 OS(192.168.200.89)에서 기동 중인 PostgreSQL 서버와 직접 연동 완료!
      - PG_DSN=postgresql://postgres:jis15084%21%40api@192.168.200.89:5432/ktpoc
    networks:
      - ai-docker-net
    restart: always



volumes:
  pgdata:
    driver: local

