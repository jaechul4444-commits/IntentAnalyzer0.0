version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analyzer-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Docker 내부 네트워크 통신을 위해 호스트 주소를 컨테이너 서비스명으로 덮어씁니다.
      - ES_HOST=http://elasticsearch:9200
      - PG_DSN=postgresql://postgres:password@db:5432/intent_db
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: always

  db:
    image: postgres:14
    container_name: analyzer-db
    environment:
      - POSTGRES_DB=intent_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intent_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: analyzer-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g" # 서버 성능에 맞게 조절 (최소 512m 권장)
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
    driver: local
  esdata:
    driver: local
